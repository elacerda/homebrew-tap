name: Test Formula

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Test astrofetch formula on macOS
    runs-on: macos-latest

    steps:
      - name: Checkout tap
        uses: actions/checkout@v5

      - name: Show Homebrew environment
        run: |
          brew --version
          brew config

      - name: Register local tap
        run: |
          brew tap elacerda/tap "$GITHUB_WORKSPACE"
          brew tap

      - name: Install formula from tap
        run: |
          brew install elacerda/tap/astrofetch

      - name: Run astrofetch
        run: |
          astrofetch --version
          astrofetch --compact

      - name: Run formula test
        run: |
          brew test elacerda/tap/astrofetch

      - name: Audit formula
        run: |
          brew audit --formula elacerda/tap/astrofetch
